<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5" />
  <title>CHM Car · 港澳大陸叫車・澳門酒店・演唱會</title>
  <meta name="description" content="旅行社點對點叫車（香港・澳門・大陸）、澳門酒店訂房、演唱會購票一站式平台。" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0B2A4A" />
  <meta name="color-scheme" content="light dark" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CHM Car" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="64x64" href="icons/favicon-64.png" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- App shell -->
  <header class="appbar" id="appbar">
    <button class="appbar__brand" type="button" data-link="#/home" aria-label="CHM Car home">
      <img src="icons/icon-192.png" alt="" class="appbar__logo" />
      <span class="appbar__name">CHM<span class="appbar__name-accent">Car</span></span>
    </button>
    <div class="appbar__actions">
      <button class="acct-btn" id="acctBtn" type="button" aria-label="Account"><span id="acctLabel">·</span></button>
      <div class="lang-switch" id="langSwitch">
        <button class="lang-switch__btn" id="langBtn" type="button" aria-haspopup="listbox" aria-expanded="false">
          <span id="langCurrent">繁中</span>
          <svg width="12" height="12" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <ul class="lang-switch__menu" id="langMenu" role="listbox" hidden></ul>
      </div>
    </div>
  </header>

  <main id="app" class="app" aria-live="polite">
    <!-- splash while JS boots -->
    <div class="splash" id="splash">
      <img src="icons/icon-192.png" alt="" class="splash__logo" />
      <div class="splash__spinner" aria-hidden="true"></div>
    </div>
  </main>

  <!-- bottom tab navigation -->
  <nav class="tabbar" id="tabbar" aria-label="Primary">
    <button class="tab" data-link="#/home" data-tab="home" type="button">
      <svg viewBox="0 0 24 24" class="tab__icon" aria-hidden="true"><path d="M3 11l9-8 9 8M5 10v10h5v-6h4v6h5V10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="tab__label" data-i18n="nav.home">首頁</span>
    </button>
    <button class="tab" data-link="#/car" data-tab="car" type="button">
      <svg viewBox="0 0 24 24" class="tab__icon" aria-hidden="true"><path d="M5 16l1.2-5A3 3 0 019 9h6a3 3 0 012.8 2L19 16M4 16h16v3h-2v-1H6v1H4z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="8" cy="18.5" r="1.4" fill="currentColor"/><circle cx="16" cy="18.5" r="1.4" fill="currentColor"/></svg>
      <span class="tab__label" data-i18n="nav.car">叫車</span>
    </button>
    <button class="tab" data-link="#/hotel" data-tab="hotel" type="button">
      <svg viewBox="0 0 24 24" class="tab__icon" aria-hidden="true"><path d="M3 20V6h10v6h8v8M3 12h10M7 9h0M7 15h0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="tab__label" data-i18n="nav.hotel">酒店</span>
    </button>
    <button class="tab" data-link="#/concert" data-tab="concert" type="button">
      <svg viewBox="0 0 24 24" class="tab__icon" aria-hidden="true"><path d="M9 18V6l10-2v12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="6" cy="18" r="3" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="16" cy="16" r="3" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      <span class="tab__label" data-i18n="nav.concert">演唱會</span>
    </button>
    <button class="tab" data-link="#/orders" data-tab="orders" type="button">
      <svg viewBox="0 0 24 24" class="tab__icon" aria-hidden="true"><path d="M6 3h9l3 3v15H6zM9 8h6M9 12h6M9 16h4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="tab__label" data-i18n="nav.orders">訂單</span>
    </button>
  </nav>

  <!-- modal / sheet host -->
  <div class="sheet-host" id="sheetHost" hidden></div>
  <div class="toast" id="toast" hidden></div>

  <script src="js/i18n.js"></script>
  <script src="js/i18n-extra.js"></script>
  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
